<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Gate Pass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="flex items-center justify-center p-4 text-white" onload="checkExistingApplication()">

    <div class="glass-card w-full max-w-lg rounded-2xl p-8 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        
        <h2 class="text-3xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 text-center relative z-10">
            Apply Gate Pass
        </h2>

        <!-- Application Form -->
        <form id="applicationForm" class="space-y-5 relative z-10" onsubmit="submitApplication(event)">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-1">Full Name (as per ID)</label>
                    <input type="text" id="name" required class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">USN</label>
                    <input type="text" id="usn" required class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="1XY21CS001">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Roll Number</label>
                    <input type="text" id="roll" required class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="42">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Branch</label>
                    <input type="text" id="branch" required class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="CSE">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Year & Sem</label>
                    <input type="text" id="year_sem" required class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="3rd Yr, 6th Sem">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-1">College Name</label>
                    <input type="text" id="college" required class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="University Name">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-1">Reason for Leave</label>
                    <textarea id="reason" required rows="2" class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500" placeholder="Briefly describe your reason..."></textarea>
                </div>
                <div class="col-span-2 border-t border-gray-700/50 pt-4 mt-2">
                    <label class="block text-sm font-medium text-gray-300 mb-1">Emergency Document (Optional, PDF/Image)</label>
                    <input type="file" id="document" accept=".pdf,image/*" class="w-full px-4 py-2 bg-gray-800/50 border border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-white transition placeholder-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-500/20 file:text-purple-400 hover:file:bg-purple-500/30">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold rounded-xl shadow-lg transform hover:-translate-y-1 transition-all duration-200">
                Apply for Pass
            </button>
        </form>

        <!-- Status Tracking Area (Hidden initially) -->
        <div id="statusSection" class="hidden space-y-6 relative z-10 mt-4 fade-in">
            <div class="bg-gray-800/60 p-5 rounded-xl border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-lg">Application Tracker</h3>
                    <span id="stStatus" class="status-badge status-pending">Pending</span>
                </div>
                
                <div class="space-y-2 text-sm text-gray-300">
                    <p><span class="font-medium text-gray-400">Name:</span> <span id="stName"></span></p>
                    <p><span class="font-medium text-gray-400">AI Urgency Analysis:</span> <span id="stPriority"></span></p>
                </div>
                
                <div class="mt-6 pt-6 border-t border-gray-700/50">
                    <div class="flex items-center justify-between mb-3">
                        <p class="text-sm font-semibold text-blue-400 uppercase tracking-wider">Formal Application Letter</p>
                        <span class="text-[10px] text-gray-500 bg-gray-800 px-2 py-0.5 rounded">AI GENERATED</span>
                    </div>
                    <div class="bg-gray-900/90 p-6 rounded-2xl text-base text-gray-200 h-80 overflow-y-auto whitespace-pre-wrap border border-white/10 shadow-2xl leading-relaxed font-serif" style="scrollbar-width: thin;" id="stLetter"></div>
                </div>
            </div>

            <!-- Generated QR Code Area -->
            <div id="qrSection" class="hidden flex flex-col items-center bg-gray-800/60 p-5 rounded-xl border border-green-500/30">
                <p id="approvalMessage" class="text-green-400 font-bold mb-3 text-center">✓ Your gate pass is approved!<br>You can go to home.</p>
                <p class="text-xs text-gray-400 mb-4 text-center">Scan this QR at the exit gate. Valid for 2 hours.</p>
                <div class="bg-white p-2 rounded-lg shadow-xl">
                    <img id="qrCodeImg" src="" alt="QR Code" class="w-48 h-48 object-contain">
                </div>
            </div>
        </div>

    </div>

    <script src="/static/script.js?v=1.1"></script>
</body>
</html>
